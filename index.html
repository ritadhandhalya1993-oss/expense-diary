<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Pro Manager</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --primary: #2c3e50; --secondary: #27ae60; --danger: #e74c3c; --info: #3498db; }
    body { font-family: 'Segoe UI', sans-serif; background:#f4f7f6; padding:10px; color: #333; margin:0; }
    h2 { text-align: center; color: var(--primary); margin-top: 10px; }
    .box { background:white; padding:15px; margin-bottom:15px; border-radius:12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 14px; }
    input, select { padding:12px; margin-bottom:12px; width:100%; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    button { padding:12px; width:100%; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
    .btn-add { background: var(--secondary); color: white; }
    .btn-export { background: var(--info); color: white; }
    .btn-backup { background: #9b59b6; color: white; }
    .btn-clear { background: var(--danger); color: white; font-size: 14px; }
    .btn-delete { background: var(--danger); color: white; padding: 5px 10px; font-size: 12px; width: auto; }
    .stats { display: flex; justify-content: space-between; text-align: center; }
    .stats div { flex: 1; }
    .stats h3 { margin: 5px 0; font-size: 18px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: var(--primary); color: white; }
    .chart-container { position: relative; height:250px; width:100%; margin-bottom: 20px; }
  </style>
</head>
<body>

<h2>💰 My Expense Diary</h2>

<div class="box">
  <div class="stats">
    <div><label>Balance</label><h3 style="color:var(--secondary)">₹ <span id="balance">0</span></h3></div>
    <div><label>Expense</label><h3 style="color:var(--danger)">₹ <span id="totalExpense">0</span></h3></div>
  </div>
</div>

<div class="box">
  <label>Add New Entry</label>
  <input type="date" id="date">
  <input type="text" id="incomeSource" placeholder="Source Name">
  <input type="number" id="amount" placeholder="Income ₹">
  <input type="number" id="expense" placeholder="Expense ₹">
  <select id="expenseType" onchange="checkOther()">
    <option value="General">General</option>
    <option value="Milk">Milk</option>
    <option value="Petrol">Petrol</option>
    <option value="Grocery">Grocery</option>
    <option value="Light Bill">Light Bill</option>
    <option value="EMI">EMI</option>
    <option value="Food">Food</option>
    <option value="Postpaid">Postpaid</option>
    <option value="Other">Other</option>
  </select>
  <input type="text" id="customType" placeholder="Category Name" style="display:none;">
  <button class="btn-add" onclick="addData()">➕ Add Entry</button>
</div>

<div class="box">
  <label>Filter by Month</label>
  <input type="month" id="monthFilter" onchange="render()">
  <button class="btn-export" onclick="exportMonthlyCSV()">📥 Download Selected Month CSV</button>
  <button class="btn-clear" onclick="clearFilteredMonth()">🗑️ Clear Selected Month Data</button>
</div>

<div class="box">
  <div class="chart-container"><canvas id="incomeExpenseChart"></canvas></div>
  <div class="chart-container"><canvas id="categoryChart"></canvas></div>
</div>

<div class="box" style="overflow-x:auto;">
  <table>
    <thead><tr><th>Date</th><th>Name</th><th>In</th><th>Out</th><th>Type</th><th>X</th></tr></thead>
    <tbody id="tableData"></tbody>
  </table>
</div>

<div class="box">
  <button class="btn-backup" onclick="backupData()">☁ Full Backup (.json)</button>
  <label>Restore:</label>
  <input type="file" onchange="restoreData(event)">
</div>

<script>
let data = JSON.parse(localStorage.getItem("financeData")) || [];
document.getElementById('date').valueAsDate = new Date();
document.getElementById('monthFilter').value = new Date().toISOString().slice(0, 7);

function save() { localStorage.setItem("financeData", JSON.stringify(data)); }

function checkOther() { document.getElementById('customType').style.display = (document.getElementById('expenseType').value === "Other") ? "block" : "none"; }

function addData() {
  const dateVal = document.getElementById('date').value;
  let typeVal = document.getElementById('expenseType').value;
  if(typeVal === "Other") typeVal = document.getElementById('customType').value || "Other";

  data.push({
    id: Date.now(),
    date: dateVal,
    source: document.getElementById('incomeSource').value || "General",
    amount: Number(document.getElementById('amount').value) || 0,
    expense: Number(document.getElementById('expense').value) || 0,
    type: typeVal
  });
  save(); render();
  document.getElementById('incomeSource').value = "";
  document.getElementById('amount').value = "";
  document.getElementById('expense').value = "";
}

function deleteEntry(id) {
  if(confirm("Delete this entry?")) { data = data.filter(i => i.id !== id); save(); render(); }
}

function clearFilteredMonth() {
  const month = document.getElementById('monthFilter').value;
  if(!month) return alert("મહિનો પસંદ કરો");
  if(confirm(month + " નો બધો ડેટા ડિલીટ કરવો છે? (પહેલા CSV ડાઉનલોડ કરી લેવી)")) {
    data = data.filter(d => !d.date.startsWith(month));
    save(); render();
  }
}

function render() {
  let totalIncome = 0, totalExp = 0, categoryData = {};
  const month = document.getElementById('monthFilter').value;
  const tableBody = document.getElementById('tableData');
  tableBody.innerHTML = "";

  const sortedData = [...data].sort((a, b) => new Date(b.date) - new Date(a.date));

  sortedData.forEach(d => {
    if(month && !d.date.startsWith(month)) return;
    totalIncome += d.amount; totalExp += d.expense;
    if(d.expense > 0) categoryData[d.type] = (categoryData[d.type] || 0) + d.expense;

    tableBody.innerHTML += `<tr>
      <td>${d.date.split('-').reverse().join('/')}</td>
      <td>${d.source}</td>
      <td style="color:green">${d.amount}</td>
      <td style="color:red">${d.expense}</td>
      <td>${d.type}</td>
      <td><button class="btn-delete" onclick="deleteEntry(${d.id})">❌</button></td>
    </tr>`;
  });

  document.getElementById('totalExpense').innerText = totalExp;
  document.getElementById('balance').innerText = totalIncome - totalExp;
  updateCharts(totalIncome, totalExp, categoryData);
}

// Charts
const ctx1 = document.getElementById('incomeExpenseChart').getContext('2d');
let incomeChart = new Chart(ctx1, { type: 'doughnut', data: { labels: ['Income', 'Expense'], datasets: [{ data: [0, 0], backgroundColor: ['#27ae60', '#e74c3c'] }] }, options: { maintainAspectRatio: false } });
const ctx2 = document.getElementById('categoryChart').getContext('2d');
let categoryChart = new Chart(ctx2, { type: 'bar', data: { labels: [], datasets: [{ label: 'Expense', data: [], backgroundColor: '#3498db' }] }, options: { maintainAspectRatio: false } });

function updateCharts(i, e, c) {
  incomeChart.data.datasets[0].data = [i, e]; incomeChart.update();
  categoryChart.data.labels = Object.keys(c); categoryChart.data.datasets[0].data = Object.values(c); categoryChart.update();
}

function exportMonthlyCSV() {
  const month = document.getElementById('monthFilter').value;
  const filtered = data.filter(d => d.date.startsWith(month));
  if(filtered.length === 0) return alert("આ મહિનાનો કોઈ ડેટા નથી!");

  let csv = "\uFEFFDate,Source,Income,Expense,Type\n";
  filtered.forEach(d => { csv += `${d.date},${d.source},${d.amount},${d.expense},${d.type}\n`; });
  
  let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `Finance_Report_${month}.csv`;
  link.click();
}

function backupData() {
  let blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "Full_Backup_" + new Date().toLocaleDateString() + ".json";
  link.click();
}

function restoreData(e) {
  let file = e.target.files[0];
  let reader = new FileReader();
  reader.onload = function(e) { data = JSON.parse(e.target.result); save(); render(); alert("Restored!"); };
  reader.readAsText(file);
}
render();
</script>
</body>
</html>
